[platformio]
; Phase 1: Friend Maker firmware with Bluetooth Classic
default_envs = esp32dev_wireless

; ---------------------------------------------------------------------------
; Phase 0 smoke test — minimal Arduino sketch, no Bluetooth
; Confirms toolchain, upload, and serial monitor work.
; ---------------------------------------------------------------------------
[env:esp32dev]
platform = platformio/espressif32
board = esp32dev
framework = arduino

upload_protocol = esptool
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200
upload_speed = 460800

; ---------------------------------------------------------------------------
; Phase 1+ — Friend Maker firmware with Bluetooth Classic
; Switch default_envs to this env after copying Friend Maker src into src/
; ---------------------------------------------------------------------------
[env:esp32dev_wireless]
platform = platformio/espressif32
board = esp32dev
framework = arduino, espidf

build_flags =
    -DSWITCH_AUTO_DRAW_USE_CLASSIC_BT=1

upload_protocol = esptool
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200
upload_speed = 460800
